<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 280" width="1200" height="280" preserveAspectRatio="xMidYMid slice">
  <defs>
    <pattern id="tiles" x="-10" y="-10" width="90" height="90" patternUnits="userSpaceOnUse">
      <rect x="14" y="14" width="62" height="62" rx="14" ry="14" fill="#00ff7f" fill-opacity="0.055" stroke="#00ff7f" stroke-opacity="0.10" stroke-width="1"/>
    </pattern>

    <radialGradient id="centerGlow" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#00ff7f" stop-opacity="0.22"/>
      <stop offset="45%" stop-color="#00ff7f" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#00ff7f" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="leftGlow" cx="25%" cy="50%" r="30%">
      <stop offset="0%" stop-color="#00ff7f" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#00ff7f" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="rightGlow" cx="75%" cy="50%" r="30%">
      <stop offset="0%" stop-color="#00ff7f" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#00ff7f" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="edgeFade" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0D1117" stop-opacity="1"/>
      <stop offset="12%" stop-color="#0D1117" stop-opacity="0"/>
      <stop offset="88%" stop-color="#0D1117" stop-opacity="0"/>
      <stop offset="100%" stop-color="#0D1117" stop-opacity="1"/>
    </linearGradient>

    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.2"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1200" height="280" fill="#0D1117"/>
  <rect width="1200" height="280" fill="url(#tiles)"/>

  <circle cx="300" cy="140" r="120" fill="#00ff7f" fill-opacity="0.09">
    <animate attributeName="r" values="120;155;120" dur="6s" repeatCount="indefinite"/>
    <animate attributeName="fill-opacity" values="0.09;0.04;0.09" dur="6s" repeatCount="indefinite"/>
  </circle>
  <circle cx="900" cy="140" r="140" fill="#00ff7f" fill-opacity="0.08">
    <animate attributeName="r" values="140;175;140" dur="7.5s" repeatCount="indefinite"/>
    <animate attributeName="fill-opacity" values="0.08;0.03;0.08" dur="7.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="600" cy="140" r="80" fill="#00ff7f" fill-opacity="0.06">
    <animate attributeName="r" values="80;110;80" dur="5s" repeatCount="indefinite"/>
  </circle>

  <rect width="1200" height="280" fill="url(#leftGlow)"/>
  <rect width="1200" height="280" fill="url(#rightGlow)"/>
  <rect width="1200" height="280" fill="url(#centerGlow)"/>
  <rect width="1200" height="280" fill="url(#edgeFade)"/>

  <g filter="url(#softGlow)">
    <text x="600" y="160" text-anchor="middle"
          font-family="Segoe UI, system-ui, -apple-system, BlinkMacSystemFont, sans-serif"
          font-size="78" font-weight="800" fill="#E6EDF3" letter-spacing="-1.5">
      Kaleem M
      <animate attributeName="opacity" from="0" to="1" dur="1.2s" fill="freeze"/>
    </text>
  </g>

  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="0.6s" dur="1s" fill="freeze"/>
    <line x1="540" y1="190" x2="660" y2="190" stroke="#00ff7f" stroke-width="2" stroke-opacity="0.75" stroke-linecap="round"/>
    <circle cx="600" cy="190" r="4" fill="#00ff7f">
      <animate attributeName="fill-opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>
